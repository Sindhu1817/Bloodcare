<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register Donor</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='register.css') }}">

</head>

<body>


<!-- ================= LEFT SIDE ================= -->

<div class="left-side">

    <div class="overlay">

        <span class="badge">
            DONOR REGISTRATION PORTAL
        </span>

        <h1>
            Save Lives.<br>
            Donate Blood.
        </h1>

        <p>
            Join thousands of donors helping patients
            in emergency situations.

            Your one donation can save up to three lives.
        </p>


        <div class="features">

            <span>✔ Emergency Requests</span>

            <span>✔ Verified Donors</span>

            <span>✔ Secure Platform</span>

        </div>

    </div>

</div>



<!-- ================= RIGHT SIDE ================= -->

<div class="right-side">

    <div class="container">

        <h2>Create Donor Account</h2>

        <p class="subtitle">
            Register to start saving lives
        </p>



        <!-- ================= FORM ================= -->

        <form id="registerForm">


            <!-- NAME -->

            <input type="text"
                   id="name"
                   placeholder="Full Name"
                   required>



            <!-- AGE + GENDER -->

            <div class="row">

                <input type="number"
                       id="age"
                       placeholder="Age"
                       min="18"
                       max="65"
                       required>


                <select id="gender" required>

                    <option value="">
                        Select Gender
                    </option>

                    <option value="Male">
                        Male
                    </option>

                    <option value="Female">
                        Female
                    </option>

                    <option value="Other">
                        Other
                    </option>

                </select>

            </div>



            <!-- BLOOD GROUP -->

            <select id="bloodGroup" required>

                <option value="">
                    Select Blood Group
                </option>

                <option value="A+">A+</option>
                <option value="A-">A-</option>

                <option value="B+">B+</option>
                <option value="B-">B-</option>

                <option value="O+">O+</option>
                <option value="O-">O-</option>

                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>

            </select>



            <!-- CONTACT -->

            <input type="tel"
                   id="contact"
                   placeholder="Contact Number"
                   pattern="[0-9]{10}"
                   maxlength="10"
                   required>



            <!-- EMAIL -->

            <input type="email"
                   id="email"
                   placeholder="Email Address"
                   required>



            <!-- STATE -->

            <select id="state" required>

                <option value="">
                    Select State
                </option>

            </select>



            <!-- CITY -->

            <select id="city" required>

                <option value="">
                    Select City
                </option>

            </select>



            <!-- SUBMIT BUTTON -->

            <button type="submit">

                Save a Life

            </button>

        </form>



        <!-- SUCCESS / ERROR MESSAGE -->

        <p id="message"></p>

    </div>

</div>



<!-- ================= JAVASCRIPT ================= -->

<script src="{{ url_for('static', filename='register.js') }}"></script>

</body>
</html>
